<div id="ls-drawer-overlay" class="ls-overlay">
  <div id="ls-drawer" class="ls-drawer">
    <!-- Main layout: left toolbar + content area -->
    <div class="ls-main-layout">
      <!-- Left Toolbar -->
      <div class="ls-left-toolbar">
        <!-- Brand -->
        <div class="ls-ltb-brand" title="Lorebook Studio">LS</div>

        <!-- Book selector -->
        <div class="ls-ltb-item">
          <button class="ls-ltb-btn" data-popover="ls-pop-book" title="Select Lorebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          </button>
          <div id="ls-pop-book" class="ls-ltb-popover ls-hidden">
            <div class="ls-pop-title">Lorebook</div>
            <select id="ls-book-selector" class="ls-select">
              <option value="">-- Select Lorebook --</option>
            </select>
          </div>
        </div>

        <!-- Entry list toggle -->
        <button id="ls-btn-entry-list" class="ls-ltb-btn" title="Toggle entry list">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>

        <div class="ls-ltb-separator"></div>

        <!-- Search -->
        <div class="ls-ltb-item">
          <button class="ls-ltb-btn" data-popover="ls-pop-search" title="Search entries">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <div id="ls-pop-search" class="ls-ltb-popover ls-hidden">
            <div class="ls-pop-title">Search</div>
            <div class="ls-search-wrapper">
              <input type="text" id="ls-search-input" class="ls-input" placeholder="Search entries..." />
              <button id="ls-search-clear" class="ls-pop-clear-btn" title="Clear search">&times;</button>
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div class="ls-ltb-item">
          <button class="ls-ltb-btn" data-popover="ls-pop-filters" title="Filter entries">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          </button>
          <div id="ls-pop-filters" class="ls-ltb-popover ls-hidden">
            <div class="ls-pop-title">Filters</div>
            <div class="ls-pop-field">
              <label class="ls-pop-label">Category</label>
              <select id="ls-filter-category" class="ls-select ls-select-sm">
                <option value="">All Categories</option>
                <option value="__uncategorized__">Uncategorized</option>
              </select>
            </div>
            <div class="ls-pop-field">
              <label class="ls-pop-label">Status</label>
              <select id="ls-filter-status" class="ls-select ls-select-sm">
                <option value="">All Statuses</option>
                <option value="draft">Draft</option>
                <option value="in-progress">In Progress</option>
                <option value="review">Review</option>
                <option value="complete">Complete</option>
              </select>
            </div>
            <div class="ls-pop-btn-row">
              <button id="ls-filter-pinned" class="ls-btn ls-btn-sm" title="Show pinned entries">Pinned</button>
              <button id="ls-filter-orphans" class="ls-btn ls-btn-sm" title="Show orphan entries">Orphans</button>
              <button id="ls-filter-disabled" class="ls-btn ls-btn-sm" title="Show disabled entries">Disabled</button>
            </div>
          </div>
        </div>

        <div class="ls-ltb-separator"></div>

        <!-- Layout -->
        <div class="ls-ltb-item">
          <button class="ls-ltb-btn" data-popover="ls-pop-layout" title="Graph layout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
          <div id="ls-pop-layout" class="ls-ltb-popover ls-hidden">
            <div class="ls-pop-title">Layout</div>
            <select id="ls-layout-selector" class="ls-select">
              <option value="force">Force-Directed 3D</option>
              <option value="grid">3D Grid</option>
              <option value="sphere">Sphere</option>
              <option value="helix">Helix</option>
            </select>
          </div>
        </div>

        <!-- Zoom -->
        <button id="ls-zoom-in" class="ls-ltb-btn" title="Zoom in">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="ls-zoom-out" class="ls-ltb-btn" title="Zoom out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="ls-zoom-fit" class="ls-ltb-btn" title="Fit all">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>

        <!-- Reset view -->
        <button id="ls-btn-reset-view" class="ls-ltb-btn" title="Reset view (clear saved positions)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>

        <!-- Link visibility -->
        <div class="ls-ltb-item">
          <button class="ls-ltb-btn" data-popover="ls-pop-links" title="Link visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
          <div id="ls-pop-links" class="ls-ltb-popover ls-hidden">
            <div class="ls-pop-title">Links</div>
            <label class="ls-toggle">
              <input type="checkbox" id="ls-toggle-auto-links" checked />
              <span>Auto-detected</span>
            </label>
            <label class="ls-toggle">
              <input type="checkbox" id="ls-toggle-manual-links" checked />
              <span>Manual</span>
            </label>
          </div>
        </div>

        <!-- Orbit -->
        <button id="ls-btn-auto-orbit" class="ls-ltb-btn" title="Toggle auto-orbit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 2a10 10 0 0 0 0 20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
        </button>

        <!-- Graph visibility -->
        <button id="ls-btn-toggle-graph" class="ls-ltb-btn active" title="Toggle graph canvas">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>

        <!-- View mode -->
        <button id="ls-btn-view-mode" class="ls-ltb-btn" title="Toggle card/label view">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        </button>

        <div class="ls-ltb-separator"></div>

        <!-- Stats -->
        <button id="ls-btn-stats" class="ls-ltb-btn" title="Statistics">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </button>

        <!-- Connect / Link -->
        <button id="ls-btn-connect" class="ls-ltb-btn" title="Connect two entries">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/></svg>
        </button>

        <!-- Add entry -->
        <button id="ls-btn-add-entry" class="ls-ltb-btn ls-ltb-btn-accent" title="Add new entry">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>

        <div class="ls-ltb-spacer"></div>

        <!-- Theme -->
        <div class="ls-ltb-item">
          <button class="ls-ltb-btn" data-popover="ls-pop-theme" title="Visual theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <div id="ls-pop-theme" class="ls-ltb-popover ls-hidden">
            <div class="ls-pop-title">Theme</div>
            <select id="ls-theme-selector" class="ls-select ls-select-sm">
              <option value="midnight">Midnight</option>
              <option value="nebula">Nebula</option>
              <option value="ember">Ember</option>
              <option value="arctic">Arctic</option>
            </select>
          </div>
        </div>

        <!-- Close -->
        <button id="ls-btn-close" class="ls-ltb-btn" title="Close Lorebook Studio">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Entry List Panel (hidden by default) -->
      <div id="ls-entry-list-panel" class="ls-entry-list-panel ls-hidden">
        <div class="ls-entry-list-header">
          <span class="ls-entry-list-title">Entries</span>
          <span id="ls-entry-list-count" class="ls-entry-list-count">0</span>
        </div>
        <div id="ls-entry-list-body" class="ls-entry-list-body"></div>
      </div>

      <!-- Graph canvas card (toggleable) -->
      <div class="ls-content">
        <div id="ls-graph-card" class="ls-graph-card ls-glass">
          <div id="ls-graph-container" class="ls-graph-container"></div>
        </div>
      </div>

    </div>

    <!-- Status bar -->
    <div id="ls-status-bar" class="ls-status-bar">
      <span class="ls-status-left">
        <span class="ls-branding">Lorebook Studio <span class="ls-branding-by">by</span> Hyperion <span class="ls-branding-sep">&mdash;</span> <span class="ls-branding-version">v2.3.0</span></span>
        <a href="https://ko-fi.com/hype" target="_blank" rel="noopener noreferrer" class="ls-kofi-link" title="Support on Ko-fi">&#9829;</a>
        <span class="ls-branding-divider"></span>
        <span id="ls-status-text">Select a lorebook to begin</span>
      </span>
      <span id="ls-entry-count"></span>
    </div>

    <!-- Stats panel (hidden by default) -->
    <div id="ls-stats-panel" class="ls-stats-panel ls-stats-hidden">
      <div class="ls-stats-header">
        <h3>Lorebook Statistics</h3>
        <button id="ls-stats-close" class="ls-btn ls-btn-icon">&times;</button>
      </div>
      <div id="ls-stats-body" class="ls-stats-body"></div>
    </div>

    <!-- Category Manager (hidden by default) -->
    <div id="ls-category-panel" class="ls-stats-panel ls-stats-hidden">
      <div class="ls-stats-header">
        <h3>Manage Categories</h3>
        <button id="ls-category-close" class="ls-btn ls-btn-icon">&times;</button>
      </div>
      <div id="ls-category-body" class="ls-stats-body">
        <div id="ls-category-list"></div>
        <div class="ls-category-add-row">
          <input type="color" id="ls-category-new-color" class="ls-color-input" value="#e06c75" />
          <input type="text" id="ls-category-new-name" class="ls-input ls-flex-grow" placeholder="New category name..." />
          <button id="ls-btn-add-category" class="ls-btn ls-btn-sm ls-btn-primary">Add</button>
        </div>
      </div>
    </div>

    <!-- Tooltip (positioned via JS, hidden by default) -->
    <div id="ls-tooltip" class="ls-tooltip ls-tooltip-hidden"></div>
  </div>
</div>
